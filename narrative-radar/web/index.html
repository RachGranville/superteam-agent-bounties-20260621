<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Solana Narrative Radar</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #080a0f;
        --panel: #111722;
        --panel-2: #172033;
        --text: #f6f8fb;
        --muted: #9facbd;
        --line: #2d384b;
        --green: #41f0a8;
        --violet: #8f7cff;
        --amber: #f6c35c;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      main {
        max-width: 1180px;
        margin: 0 auto;
        padding: 32px 20px 56px;
      }
      header {
        display: grid;
        gap: 12px;
        border-bottom: 1px solid var(--line);
        padding-bottom: 24px;
      }
      h1 {
        margin: 0;
        font-size: clamp(34px, 6vw, 72px);
        line-height: 0.95;
      }
      p { color: var(--muted); line-height: 1.6; }
      .meta {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      .pill {
        border: 1px solid var(--line);
        background: var(--panel);
        color: var(--muted);
        padding: 8px 10px;
        border-radius: 999px;
        font-size: 13px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 16px;
        margin-top: 28px;
      }
      article {
        border: 1px solid var(--line);
        background: var(--panel);
        border-radius: 8px;
        padding: 18px;
      }
      h2 { margin: 0 0 10px; font-size: 20px; }
      .score {
        color: var(--green);
        font-size: 34px;
        font-weight: 800;
      }
      .signals {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
        margin: 16px 0;
      }
      .signal {
        background: var(--panel-2);
        border-radius: 6px;
        padding: 10px;
      }
      .signal strong { display: block; color: var(--text); }
      ul { padding-left: 20px; color: var(--muted); }
      a { color: var(--green); }
      .warning {
        border-left: 3px solid var(--amber);
        padding-left: 12px;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Solana Narrative Radar</h1>
        <p>Agent-ranked emerging narratives using GitHub activity, live Solana RPC health, and an explainable scoring model.</p>
        <div class="meta" id="meta"></div>
      </header>
      <section class="grid" id="cards"></section>
    </main>
    <script>
      async function loadReport() {
        const response = await fetch("../outputs/report.json", { cache: "no-store" });
        return response.json();
      }

      function signal(label, value) {
        return `<div class="signal"><strong>${value}</strong><span>${label}</span></div>`;
      }

      loadReport().then((report) => {
        document.querySelector("#meta").innerHTML = [
          `Generated ${new Date(report.generatedAt).toLocaleString()}`,
          `${report.solanaHealth.averageTransactionsPerSecond} avg TPS sample`,
          report.agent
        ].map((item) => `<span class="pill">${item}</span>`).join("");

        document.querySelector("#cards").innerHTML = report.detectedNarratives.map((item) => `
          <article>
            <div class="score">${item.score}</div>
            <h2>${item.title}</h2>
            <p>${item.whyItMatters}</p>
            <div class="signals">
              ${signal("repo count", item.signals.repoCount)}
              ${signal("star sample", item.signals.starSample)}
              ${signal("freshness days", item.signals.averageFreshnessDays)}
              ${signal("network TPS", item.signals.networkTps)}
            </div>
            <h3>Build ideas</h3>
            <ul>${item.buildIdeas.map((idea) => `<li>${idea}</li>`).join("")}</ul>
            <h3>Evidence</h3>
            <ul>${item.evidence.slice(0, 4).map((repo) => `<li><a href="${repo.url}">${repo.name}</a></li>`).join("")}</ul>
          </article>
        `).join("");

        if (report.sourceWarnings.length) {
          document.querySelector("#cards").insertAdjacentHTML("beforeend", `
            <article class="warning">
              <h2>Source warnings</h2>
              <ul>${report.sourceWarnings.map((warning) => `<li>${warning}</li>`).join("")}</ul>
            </article>
          `);
        }
      }).catch((error) => {
        document.querySelector("#cards").innerHTML = `<article><h2>Unable to load report</h2><p>${error.message}</p></article>`;
      });
    </script>
  </body>
</html>
