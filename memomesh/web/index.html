<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MemoMesh Verifier</title>
    <style>
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0c1017;
        color: #f7fafc;
      }
      main {
        max-width: 860px;
        margin: 0 auto;
        padding: 32px 18px;
      }
      h1 { font-size: clamp(34px, 7vw, 72px); line-height: 0.95; margin: 0 0 16px; }
      p { color: #a9b4c5; line-height: 1.6; }
      label { display: block; margin: 18px 0 8px; color: #d8dee9; }
      textarea, input {
        width: 100%;
        min-height: 120px;
        border: 1px solid #293446;
        border-radius: 8px;
        background: #121a27;
        color: #f7fafc;
        padding: 12px;
        font: 14px ui-monospace, SFMono-Regular, Menlo, monospace;
      }
      input { min-height: auto; }
      button {
        margin-top: 16px;
        border: 0;
        border-radius: 8px;
        background: #41f0a8;
        color: #07100d;
        padding: 12px 16px;
        font-weight: 800;
        cursor: pointer;
      }
      output {
        display: block;
        margin-top: 18px;
        padding: 14px;
        border: 1px solid #293446;
        border-radius: 8px;
        background: #121a27;
        color: #41f0a8;
        word-break: break-all;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>MemoMesh Verifier</h1>
      <p>Paste an artifact and a MemoMesh receipt. The verifier recomputes SHA-256 locally in your browser.</p>
      <label for="artifact">Artifact text</label>
      <textarea id="artifact"></textarea>
      <label for="receipt">Receipt JSON</label>
      <textarea id="receipt"></textarea>
      <button id="verify">Verify</button>
      <output id="result">Waiting for input.</output>
    </main>
    <script>
      async function sha256(text) {
        const data = new TextEncoder().encode(text);
        const hash = await crypto.subtle.digest("SHA-256", data);
        return [...new Uint8Array(hash)].map((byte) => byte.toString(16).padStart(2, "0")).join("");
      }

      document.querySelector("#verify").addEventListener("click", async () => {
        const result = document.querySelector("#result");
        try {
          const artifact = document.querySelector("#artifact").value;
          const receipt = JSON.parse(document.querySelector("#receipt").value);
          const actual = await sha256(artifact);
          result.textContent = actual === receipt.artifact.sha256
            ? `OK artifact matches receipt ${receipt.receiptHash}`
            : `Mismatch expected ${receipt.artifact.sha256}, got ${actual}`;
        } catch (error) {
          result.textContent = error.message;
        }
      });
    </script>
  </body>
</html>
